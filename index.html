<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight 全球测速节点</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { margin-top: 0; font-size: 24px; color: #2c3e50; }
        p { color: #7f8c8d; margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .btn {
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(0); }
        
        /* 颜色区分 v4 和 v6 */
        .v4 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .v6 { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Twilight 测速网络</h1>
        <p>请选择您要测试的地理节点与网络协议</p>
        <div class="grid">
            <a href="http://hkv4.rtwilight.top" class="btn v4">🇭🇰 香港 v4</a>
            <a href="http://hkv6.rtwilight.top" class="btn v6">🇭🇰 香港 v6</a>
            <a href="http://sgpv4.rtwilight.top" class="btn v4">🇸🇬 新加坡 v4</a>
            <a href="http://sgpv6.rtwilight.top" class="btn v6">🇸🇬 新加坡 v6</a>
        </div>
    </div>
</body>
</html>
