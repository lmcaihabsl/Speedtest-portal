<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight Speedtest</title>
    <script src="https://fastly.jsdelivr.net/gh/librespeed/speedtest@master/speedtest.js"></script>
    <style>
        /* ... 这里的 CSS 样式保留和你上一版完全一样，保持暗黑风格 ... */
        :root { --bg-color: #141526; --text-main: #ffffff; --text-muted: #8b92a5; --accent-cyan: #00e5ff; --accent-blue: #007bff; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .header-tools { display: flex; gap: 20px; font-size: 12px; font-weight: bold; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 50px; }
        #startBtn { width: 200px; height: 200px; border-radius: 50%; background: transparent; border: 4px solid var(--accent-blue); color: var(--text-main); font-size: 48px; font-weight: 600; cursor: pointer; box-shadow: 0 0 30px rgba(0, 123, 255, 0.2), inset 0 0 20px rgba(0, 123, 255, 0.2); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; outline: none; position: relative; }
        #startBtn::before { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border-radius: 50%; border: 2px solid var(--accent-cyan); opacity: 0.5; }
        #startBtn:hover { box-shadow: 0 0 50px rgba(0, 229, 255, 0.4), inset 0 0 30px rgba(0, 229, 255, 0.3); transform: scale(1.05); }
        .results-container { display: flex; gap: 40px; margin-top: 50px; text-align: center; opacity: 0; transition: opacity 0.5s ease; }
        .result-box h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        .result-box .val { font-size: 32px; font-weight: bold; color: var(--accent-cyan); }
        .server-selector { margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .server-selector label { color: var(--text-muted); font-size: 14px; }
        select { background: rgba(255, 255, 255, 0.05); color: var(--accent-cyan); border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 20px; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; appearance: none; text-align: center; }
        select option { background: var(--bg-color); color: var(--text-main); }
        #ipDisplay { margin-top: 20px; font-size: 14px; color: var(--text-muted); min-height: 20px; }
    </style>
</head>
<body>

    <div class="header-tools">
        <span>✓ RESULTS</span>
        <span>⚙ SETTINGS</span>
    </div>

    <div id="startBtn" onclick="startStop()">GO</div>

    <div id="ipDisplay">Connecting to server...</div>

    <div class="results-container" id="resultsArea">
        <div class="result-box">
            <h3>Ping</h3>
            <div class="val"><span id="pingText">0</span> ms</div>
        </div>
        <div class="result-box">
            <h3>Download</h3>
            <div class="val"><span id="dlText">0.00</span> Mbps</div>
        </div>
        <div class="result-box">
            <h3>Upload</h3>
            <div class="val"><span id="ulText">0.00</span> Mbps</div>
        </div>
    </div>

    <div class="server-selector">
        <label>Select Testing Server</label>
        <select id="serverList" onchange="changeServer()"></select>
    </div>

    <script>
        // === 极其关键：确保路径与你的后端（PHP 或 Go 版本）匹配 ===
        // 如果你的 Librespeed 后端是 PHP 版本，通常需要加 backend/ 前缀
        // 例如：dlURL: "https://sgpv4.rtwilight.top/backend/garbage.php"
        // 这里我按最常见的根目录配置写入，如果不行，请在这个配置里加上 /backend/ 试试。
        const SPEEDTEST_SERVERS = [
            {
                name: "Singapore (IPv4)",
                server: "https://sgpv4.rtwilight.top/",
                dlURL: "https://sgpv4.rtwilight.top/backend/garbage.php",
                ulURL: "https://sgpv4.rtwilight.top/backend/empty.php",
                pingURL: "https://sgpv4.rtwilight.top/backend/empty.php",
                getIpURL: "https://sgpv4.rtwilight.top/backend/getIP.php"
            },
            {
                name: "Singapore (IPv6)",
                server: "https://sgpv6.rtwilight.top/",
                dlURL: "https://sgpv6.rtwilight.top/backend/garbage.php",
                ulURL: "https://sgpv6.rtwilight.top/backend/empty.php",
                pingURL: "https://sgpv6.rtwilight.top/backend/empty.php",
                getIpURL: "https://sgpv6.rtwilight.top/backend/getIP.php"
            },
            {
                name: "Hong Kong (IPv4)",
                server: "https://hkv4.rtwilight.top/",
                dlURL: "https://hkv4.rtwilight.top/backend/garbage.php",
                ulURL: "https://hkv4.rtwilight.top/backend/empty.php",
                pingURL: "https://hkv4.rtwilight.top/backend/empty.php",
                getIpURL: "https://hkv4.rtwilight.top/backend/getIP.php"
            },
            {
                name: "Hong Kong (IPv6)",
                server: "https://hkv6.rtwilight.top/",
                dlURL: "https://hkv6.rtwilight.top/backend/garbage.php",
                ulURL: "https://hkv6.rtwilight.top/backend/empty.php",
                pingURL: "https://hkv6.rtwilight.top/backend/empty.php",
                getIpURL: "https://hkv6.rtwilight.top/backend/getIP.php"
            }
        ];

        // 初始化下拉菜单
        const serverSelect = document.getElementById('serverList');
        SPEEDTEST_SERVERS.forEach((server, index) => {
            let option = document.createElement('option');
            option.value = index;
            option.text = server.name;
            serverSelect.appendChild(option);
        });

        // 检查全局变量是否成功加载了 script
        if (typeof Speedtest !== 'function') {
            document.getElementById('startBtn').textContent = "ERR";
            document.getElementById('ipDisplay').innerHTML = "<span style='color:red;'>核心 JS 加载失败，请检查网络或替换源。</span>";
        } else {
            var s = new Speedtest();
            // 强制启用多服务器模式下的跨域容错
            s.setParameter("telemetry_level", "none"); 

            // 切换服务器并尝试获取 IP (获取 IP 成功意味着后端连接正常)
            function changeServer() {
                if (s.getState() !== 0) s.abort(); // 切换时如果在测速就掐断
                let selectedIndex = serverSelect.value;
                document.getElementById('ipDisplay').textContent = "Connecting to " + SPEEDTEST_SERVERS[selectedIndex].name + "...";
                
                s.addTestPoint(SPEEDTEST_SERVERS[selectedIndex]);
                s.setSelectedServer(SPEEDTEST_SERVERS[selectedIndex]);
                
                // 仅重置界面 UI
                document.getElementById('pingText').textContent = '0';
                document.getElementById('dlText').textContent = '0.00';
                document.getElementById('ulText').textContent = '0.00';
            }

            // 绑定数据更新
            s.onupdate = function (data) {
                // 如果能取到 IP，显示出来
                if(data.clientIp) {
                    document.getElementById('ipDisplay').textContent = "Your IP: " + data.clientIp;
                }
                
                let status = data.testState;
                if(status >= 1 && status < 5) {
                    document.getElementById('pingText').textContent = status >= 2 ? data.pingStatus : '...';
                    document.getElementById('dlText').textContent = status >= 3 ? data.dlStatus : '...';
                    document.getElementById('ulText').textContent = status >= 4 ? data.ulStatus : '...';
                }
                
                // 后端跑崩了的处理
                if(data.testState === 5) {
                    document.getElementById('startBtn').textContent = "FAIL";
                    document.getElementById('ipDisplay').innerHTML = "<span style='color:red;'>测速中断，可能存在跨域或证书问题。</span>";
                }
            };

            s.onend = function (aborted) {
                document.getElementById('startBtn').textContent = "AGAIN";
                serverSelect.disabled = false;
            };

            // 绑定按钮行为
            function startStop() {
                if (s.getState() === 3) { // 3 代表正在上传阶段 (通常测速正在进行中)
                    s.abort();
                    document.getElementById('startBtn').textContent = "GO";
                    serverSelect.disabled = false;
                } else {
                    document.getElementById('startBtn').textContent = "STOP";
                    document.getElementById('resultsArea').style.opacity = 1;
                    serverSelect.disabled = true;
                    s.start();
                }
            }

            // 页面加载完成后立刻执行一次选中
            window.onload = function() {
                changeServer();
            }
        }
    </script>
</body>
</html>
