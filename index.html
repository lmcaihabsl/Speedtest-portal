<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight - Navigation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0d0f; /* 极暗的背景色 */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 统一的页面容器 */
        .container {
            width: 85%;
            max-width: 400px; /* 限制最大宽度，手机电脑通用 */
            text-align: center;
            z-index: 10;
        }

        /* 顶部标题区 */
        h1 {
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 10px;
            /* 银色渐变文字效果 */
            background: linear-gradient(135deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            margin-bottom: 45px;
        }

        /* 极简跳转按钮 */
        .link-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 16px;
            background-color: rgba(255, 255, 255, 0.03); /* 极弱的底色 */
            border: 1px solid rgba(255, 255, 255, 0.08); /* 极细的边框 */
            border-radius: 12px;
            color: #eeeeee;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        /* 鼠标悬浮时的交互动画 */
        .link-btn:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            color: #ffffff;
        }

        /* 底部版权信息 */
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Speedtest</h1>
        <p class="subtitle">HongKong&Singapore</p>

        <a href="https://hkv4.rtwilight.top/" class="link-btn" target="_blank">Ipv4&HongKong</a>
        <a href="https://hkv6.rtwilight.top/" class="link-btn" target="_blank">Ipv6&HongKong</a>
        <a href="https://sgpv4.rtwilight.top/" class="link-btn" target="_blank">Ipv4&Singapore</a>
        <a href="https://sgpv4.rtwilight.top/" class="link-btn" target="_blank">Ipv6&Singapore</a>
    </div>

    <div class="footer">
        © 2026 Twilight Project
    </div>

</body>
</html>
